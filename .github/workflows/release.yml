name: Release

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: ['20']
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: ⬇ Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: ⎔ Setup pnpm
        uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a # v4.4.0

      - name: ⎔ Setup Node.js ${{ matrix.node-version }} for Validate
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          cache: pnpm
          node-version: ${{ matrix.node-version }}

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: 🛡️ Audit production dependencies
        run: pnpm audit --prod --audit-level=high

      - name: 🏗 Build
        run: pnpm clean && pnpm build

      - name: 🔍 Verify types
        run: pnpm type-check

      - name: 💅 Verify format
        run: pnpm format --check --no-write

      - name: 🕵️ Lint
        run: pnpm lint:prod

      - name: 🛡️ Test
        run: pnpm test

      - name: 📏 Report bundle size
        if: github.event.event_name == 'pull_request'
        uses: andresz1/size-limit-action@94bc357df29c36c8f8d50ea497c3e225c3c95d1d # v1.8.0
        continue-on-error: true
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  release-npm:
    name: Release to NPM
    needs: validate
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'LottieFiles/relottie' && github.event_name == 'push' }}
    strategy:
      matrix:
        node-version: ['20']

    permissions:
      contents: write # Allow creating a release in the repository
      id-token: write # Required for provenance
      packages: write # Required for publishing
      pull-requests: write # Required for creating a release PR

    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: ⬇ Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # https://github.com/changesets/action/issues/201#issuecomment-1206088289
          # check out all commits and tags so changeset can skip duplicate tags
          fetch-depth: 0

      - name: ⎔ Setup pnpm
        uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a # v4.4.0

      - name: ⎔ Setup Node.js ${{ matrix.node-version }} for NPM
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          cache: pnpm
          node-version: ${{ matrix.node-version }}
          registry-url: https://registry.npmjs.org

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: ⬆️ Update npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: 🚀 Create Release Pull Request or Release to NPM
        uses: changesets/action@d94a5c301145045a0960133674e003b265942a22 # v1.8.0
        with:
          commit: 'chore: 🤖 update versions'
          title: 'chore: 🤖 update versions'
          publish: pnpm release:publish
          version: pnpm release:version
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-gpr:
    name: Release to GPR
    needs: [validate, release-npm]
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'LottieFiles/relottie' && github.event_name == 'push' }}
    strategy:
      matrix:
        node-version: ['20']

    permissions:
      contents: write # Allow creating a release in the repository
      id-token: write # Required for provenance
      packages: write # Required for publishing
      pull-requests: write # Required for creating a release PR

    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: ⬇ Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        # https://github.com/changesets/action/issues/201#issuecomment-1206088289
        # check out all commits and tags so changeset can skip duplicate tags
        with:
          fetch-depth: 0

      - name: ⎔ Setup pnpm
        uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a # v4.4.0

      - name: ⎔ Setup Node.js ${{ matrix.node-version }} for Github Packages
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          cache: pnpm
          node-version: ${{ matrix.node-version }}
          registry-url: https://npm.pkg.github.com/

      - name: 📥 Install dependencies for Github Packages
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Release to Github Packages
        uses: changesets/action@d94a5c301145045a0960133674e003b265942a22 # v1.8.0
        with:
          commit: 'chore: update versions'
          title: 'chore: update versions'
          publish: pnpm release:publish
          version: pnpm release:version
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
